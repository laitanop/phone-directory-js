<!doctype html>
<html>
  <head>
    <title>XLZ Vendor Phone Directory</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geologica:wght,CRSV@100..900,0&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geologica:wght,CRSV@100..900,0&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Geologica:wght,CRSV@100..900,0&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <meta charset="utf-8" />
    <title>My home page</title>
  </head>
  <body>
    <div id="main" class="main">
      <div id="header" class="header">
        <img src="images/XYZ-vendor-logo.svg" alt="XYZ Vendor Logo" />
        <h1 class="header-title">Phone Directory</h1>
        <p class="header-subtitle">Manage your vendor contacts in one place</p>
      </div>
      <div id="content" class="content">
        <p class="content-title">ADD NEW VENDOR</p>
        <form id="vendor-form" class="vendor-form">
          <div class="form-group">
            <label class="form-label" for="name">Name</label>
            <input
              type="text"
              id="name"
              data-testid="name"
              class="form-input"
              placeholder="e.g. John Smith"
            />
          </div>
          <div class="form-group">
            <label class="form-label" for="mobile">Mobile No.</label>
            <input
              type="text"
              id="mobile"
              data-testid="mobile"
              class="form-input"
              placeholder="e.g. 9876543210"
            />
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input
              type="text"
              id="email"
              data-testid="email"
              class="form-input"
              placeholder="e.g. john@company.com"
            />
          </div>
          <button
            type="button"
            data-testid="submit"
            class="btn-add-vendor"
            onclick="addVendor()"
          >
            + Add Vendor
          </button>
        </form>
        <div id="error-message" data-testid="error" class="error-message">
          Invalid Input
        </div>
      </div>
      <h2 class="contacts-title">Contacts Summary</h2>
      <div class="search-wrapper">
        <span class="material-symbols-outlined search-icon">search</span>
        <input
          type="text"
          class="search-input"
          placeholder="Enter mobile number..."
        />
      </div>
      <div id="content-table" class="content-table">
        <table>
          <thead>
            <tr>
              <th>NAME</th>
              <th>MOBILE</th>
              <th>EMAIL</th>
              <th>ACTION</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>John Doe</td>
              <td>1234567890</td>
              <td>john@example.com</td>
              <td>
                <button class="btn-delete">✕</button>
              </td>
            </tr>
            <tr>
              <td>Adele</td>
              <td>9999999999</td>
              <td>adele@xyzcompany.com</td>
              <td>
                <button class="btn-delete">✕</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
